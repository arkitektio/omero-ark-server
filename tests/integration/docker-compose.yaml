services:
  # Django application database for omero-ark itself (the OmeroUser table etc.).
  # Mirrors elektro's test db: fast, fsync-off postgres published on 5556.
  db:
    image: jhnnsrs/daten:next
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    environment:
      POSTGRES_MULTIPLE_DATABASES: testdb
      POSTGRES_PASSWORD: test
      POSTGRES_USER: test
    ports:
      - 5556:5432

  redis:
    image: redis:latest
    ports:
      - 6667:6379

  # Dedicated PostgreSQL 12 database backing the OMERO server (kept separate
  # from the app db on purpose — OMERO owns its own schema/state).
  omero-db:
    image: postgres:12
    environment:
      POSTGRES_USER: omero
      POSTGRES_DB: omero
      POSTGRES_PASSWORD: omero

  # Real OMERO.server. Slow to boot (minutes) and bootstraps a root user with
  # ROOTPASS; the conftest backend_stack fixture gates tests on a live ICE login.
  omeroserver:
    image: openmicroscopy/omero-server:5
    environment:
      CONFIG_omero_db_host: omero-db
      CONFIG_omero_db_user: omero
      CONFIG_omero_db_pass: omero
      CONFIG_omero_db_name: omero
      ROOTPASS: omero
    depends_on:
      - omero-db
    ports:
      - 4063:4063
      - 4064:4064
