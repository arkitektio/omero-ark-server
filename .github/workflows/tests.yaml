name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  unit:
    name: Unit tests (py${{ matrix.python-version }})
    # Fast tier: pure-logic tests, no services. Integration tests are gated
    # behind `-m integration` (see tests/conftest.py) and skipped here.
    # zeroc-ice ships only a cp312 wheel and the repo is pinned to 3.12.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run unit tests
        run: uv run pytest -m "not integration"

  integration:
    name: Integration tests (OMERO stack)
    # Boots tests/integration/docker-compose.yaml (app postgres + redis +
    # postgres:12 + openmicroscopy/omero-server:5) via dokker. OMERO is slow and
    # occasionally flaky to bootstrap, so this is allowed to fail the leg without
    # failing the build. Docker is preinstalled on ubuntu runners only.
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run integration tests
        run: uv run pytest -m integration
